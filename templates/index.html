<!DOCTYPE html>
<html>

<head>

    <title>Cancer Type Prediction</title>

    <style>

        *{

            margin:0;
            padding:0;
            box-sizing:border-box;

            font-family:Arial;

        }


        body{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:

            linear-gradient(
                rgba(0,0,0,0.45),
                rgba(0,0,0,0.45)
            ),

            url("https://images.unsplash.com/photo-1576086213369-97a306d36557");

            background-size:cover;
            background-position:center;

        }


        .container{

            width:700px;

            padding:50px;

            border-radius:25px;

            background:rgba(
                255,
                255,
                255,
                0.15
            );

            backdrop-filter:blur(20px);

            box-shadow:
            0 10px 40px rgba(
                0,
                0,
                0,
                0.25
            );

            text-align:center;

            color:white;

        }


        h1{

            font-size:48px;

            margin-bottom:15px;

        }


        .subtitle{

            font-size:22px;

            margin-bottom:40px;

            opacity:0.9;

        }


        input{

            font-size:18px;

            margin-bottom:30px;

        }


        button{

            background:
            linear-gradient(
                90deg,
                #00c6ff,
                #0072ff
            );

            color:white;

            border:none;

            padding:15px 40px;

            font-size:18px;

            border-radius:12px;

            cursor:pointer;

            transition:0.3s;

        }


        button:hover{

            transform:scale(1.08);

        }


        .result{

            margin-top:40px;

            padding:30px;

            border-radius:20px;

            background:rgba(
                255,
                255,
                255,
                0.12
            );

        }


        .prediction{

            font-size:50px;

            font-weight:bold;

            margin-bottom:20px;

            color:#00ffbf;

        }


        .confidence{

            font-size:28px;

            margin-bottom:20px;

        }


        .info{

            font-size:20px;

            line-height:1.8;

        }

    </style>

</head>


<body>

    <div class="container">

        <h1>

            🧬 Cancer Prediction

        </h1>


        <div class="subtitle">

            AI Powered RNA-Seq Analysis Platform

        </div>


        <form
            method="POST"
            enctype="multipart/form-data"
        >

            <input
                type="file"
                name="file"
                required
            >

            <br>


            <button type="submit">

                Predict

            </button>

        </form>



        {% if prediction %}

        <div class="result">

            <div class="prediction">

                {{ prediction }}

            </div>


            <div class="confidence">

                Confidence:
                {{ confidence }}%

            </div>


            <div class="info">

                Model:
                Logistic Regression

                <br>

                Genes Processed:
                20531

                <br>

                Selected Features:
                1000

            </div>

        </div>

        {% endif %}

    </div>

</body>

</html>
